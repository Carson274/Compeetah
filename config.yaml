# =====================================================================
# Compeetah dashboard configuration  (edit me — no secrets live here)
# Secrets (API keys, tokens) go in backend/.env  — see backend/.env.example
# =====================================================================

units: imperial            # imperial (°F, mi) | metric (°C, km)
poll_interval_minutes: 5   # how often weather + drive time refresh

# "Home" — where you live. Anything inside radius_m of lat/lon counts as
# "home"; outside it, the dashboard shows the distance. The `address` is used
# for the route map + drive time (more precise than the street-level lat/lon).
home:
  label: "Home — Santa Clara"
  address: "1200 Rickabaugh Way, Santa Clara, CA 95050"
  lat: 37.3558759
  lon: -121.9345402
  radius_m: 350            # street-level geocode; widen/tighten once you see real GPS

# "Work" — the drive-time destination + map endpoint.
work:
  label: "Netflix — Los Gatos"
  address: "121 Albright Way, Los Gatos, CA 95032"
  lat: 37.2569243
  lon: -121.9639389

# Where drive-time is measured *from*. "home" uses the home point above;
# "live" uses each person's most recent location (falls back to home).
drive_origin: home          # home | live

# The people on the dashboard. `id` is used in the OwnTracks URL
# (?user=<id>); `owntracks_tid` is the 2-char Tracker ID set in the app.
users:
  - id: carson
    name: "Carson"
    color: "#E50914"        # Netflix red
    owntracks_tid: "Ca"
  - id: roommate
    name: "Roommate"
    color: "#4EA1FF"
    owntracks_tid: "Ro"
